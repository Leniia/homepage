# site settings
title: Lenia
subtitle: Gesang, Songwriting und Musik mit Herz
description: Gesang, Songwriting und Musik mit Herz
baseurl: "/homepage" # the subpath of your site, e.g. /blog
url: # the base hostname & protocol for your site
author:

# Contact info (shown in the footer contact-method section).
# Leave blank to hide that row on the site. Fill in real values when ready.
email: # e.g. you@example.com — also used for the mailto: link
phone: # e.g. +49 123 456789
street_address:
city:
state:
zip_code:
country: Deutschland

# Contact form (Formspree) — free static form backend, works with GitHub Pages.
# 1. Sign up at https://formspree.io/ and create a form.
# 2. Paste the form endpoint URL below (looks like https://formspree.io/f/xxxxxxxx).
# 3. Redeploy; no other code changes needed.
# Until you set a real endpoint, submissions will not be delivered.
formspree_endpoint: "https://formspree.io/f/YOUR_FORM_ID"

# homepage tiles
tiles-source: pages # accepts "posts" or "pages"
tiles-count: 3

# social settings (key must match name of font awesome icon)
# see https://fontawesome.com/icons?d=gallery&p=2&s=brands
# Icons are not shown if value is empty
# You need to restart jekyll for changes to have an effect
socials:
  GitHub:
  GitLab:
  Google-Plus:
  Tiktok: "https://www.tiktok.com/@leniamusic.official"
  Instagram: "https://www.instagram.com/leniamusic.official/"
  LinkedIn:
  Twitter:
  Facebook:
  Slack:

# build settings
markdown: kramdown

sass:
  style: compressed
  load_paths:
    - assets/fontawesome/css

# Ensure these directories are included in the build
include:
  - assets/css
  - assets/webfonts

exclude:
- "*.gemspec"
- LICENSE.md
- CONTRIBUTING.md
- README.md 
- elements.md
- all_posts.md
- generic.md
- landing.md
